<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ bot_name or "Bot" }} — Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        :root {
            --bg:      #0d0d0d;
            --surface: #161616;
            --border:  #252525;
            --text:    #dcddde;
            --muted:   #72767d;
            --accent:  #5865f2;
            --green:   #57f287;
            --red:     #ed4245;
            --radius:  8px;
            --mono:    'Consolas', 'Monaco', 'Courier New', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-online  { background: var(--green); }
        .dot-offline { background: var(--red); }

        .header-title { font-weight: 600; font-size: 15px; }
        .header-sub   { color: var(--muted); font-size: 13px; }

        main {
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 22px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.1;
        }

        .stat-unit { font-size: 14px; font-weight: 400; color: var(--muted); }

        .guild-card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #guild-list:not(:empty) {
            margin-top: 14px;
            border-top: 1px solid var(--border);
        }

        .guild-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }

        .guild-item:last-child { border-bottom: none; }
        .guild-name { font-size: 13px; }
        .guild-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        td.mono { font-family: var(--mono); font-size: 12px; }

        .actions { display: flex; gap: 6px; justify-content: flex-end; }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn:hover            { background: var(--border); }
        .btn:disabled         { opacity: 0.6; cursor: default; }

        .btn .btn-label.htmx-indicator { display: none; }
        .btn.htmx-request .btn-label { display: none; }
        .btn.htmx-request .btn-label.htmx-indicator { display: inline; }

        .btn-primary          { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover    { background: #4752c4; border-color: #4752c4; }
        .btn-danger           { border-color: var(--red); color: var(--red); }
        .btn-danger:hover     { background: rgba(237, 66, 69, 0.1); }

        .load-form {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            border-top: 1px solid var(--border);
        }

        input[type="text"] {
            flex: 1;
            padding: 4px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
            font-family: var(--mono);
        }

        input[type="text"]:focus { outline: none; border-color: var(--accent); }
        input[type="text"]::placeholder { color: var(--muted); }

        .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }

        .badge-ok    { background: rgba(87, 242, 135, 0.12); color: var(--green); }
        .badge-error { background: rgba(237, 66, 69, 0.12);  color: var(--red); }

        .error-msg {
            font-size: 11px;
            color: var(--red);
            display: block;
            margin-top: 3px;
            font-family: var(--mono);
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
