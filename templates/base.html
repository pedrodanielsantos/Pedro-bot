<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ bot_name or "Bot" }} {% block title %}Dashboard{% endblock %}</title>
    {% if bot_avatar_url %}<link rel="icon" href="{{ bot_avatar_url }}">{% endif %}
    <style>
        :root {
            --bg:      #0d0d0d;
            --surface: #161616;
            --border:  #252525;
            --text:    #dcddde;
            --muted:   #72767d;
            --accent:  #5865f2;
            --green:   #57f287;
            --red:     #ed4245;
            --yellow:  #faa61a;
            --radius:  8px;
            --mono:    'Consolas', 'Monaco', 'Courier New', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            row-gap: 8px;
            gap: 10px;
        }

        header > a.btn {
            margin-left: auto;
            text-decoration: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            row-gap: 8px;
            gap: 10px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-online  { background: var(--green); }
        .dot-offline { background: var(--red); }

        .header-title { font-weight: 600; font-size: 15px; white-space: nowrap; }
        .header-sub   { color: var(--muted); font-size: 13px; white-space: nowrap; }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            transition: color 0.12s, background 0.12s;
        }

        .icon-btn:hover { color: var(--text); background: var(--border); }

        main {
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            flex: 1;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 18px 16px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.1;
        }

        .stat-unit { font-size: 14px; font-weight: 400; color: var(--muted); }

        .guild-card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #guild-list:not(:empty) {
            margin-top: 14px;
            border-top: 1px solid var(--border);
        }

        .guild-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }

        .guild-item:last-child { border-bottom: none; }
        .guild-name { font-size: 13px; }
        .guild-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }

        table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: var(--radius);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        table input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            margin: 0;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: var(--bg);
            cursor: pointer;
            position: relative;
            vertical-align: middle;
            flex-shrink: 0;
        }

        table input[type="checkbox"]:checked,
        table input[type="checkbox"]:indeterminate {
            background: var(--accent);
            border-color: var(--accent);
        }

        table input[type="checkbox"]:checked::after {
            content: "";
            position: absolute;
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        table input[type="checkbox"]:indeterminate::after {
            content: "";
            position: absolute;
            left: 3px;
            top: 5px;
            width: 6px;
            height: 2px;
            background: white;
        }

        th {
            text-align: left;
            height: 48px;
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        td {
            height: 48px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        td.mono { font-family: var(--mono); font-size: 12px; }

        .actions { display: flex; gap: 6px; justify-content: flex-end; }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn:hover            { background: var(--border); }
        .btn:disabled         { opacity: 0.6; cursor: default; }

        .btn .btn-label.htmx-indicator { display: none; }
        .btn.htmx-request .btn-label { display: none; }
        .btn.htmx-request .btn-label.htmx-indicator { display: inline; }

        .btn-primary          { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover    { background: #4752c4; border-color: #4752c4; }
        .btn-danger           { border-color: var(--red); color: var(--red); }
        .btn-danger:hover     { background: rgba(237, 66, 69, 0.1); }
        .btn-success          { background: var(--green); border-color: var(--green); color: #0d2c17; }
        .btn-success:hover    { background: #45d873; border-color: #45d873; }

        .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }

        .badge-ok      { background: rgba(87, 242, 135, 0.12); color: var(--green); }
        .badge-error   { background: rgba(237, 66, 69, 0.12);  color: var(--red); }
        .badge-warning { background: rgba(250, 166, 26, 0.12); color: var(--yellow); }

        .error-msg {
            font-size: 11px;
            color: var(--red);
            display: block;
            margin-top: 3px;
            font-family: var(--mono);
        }

        footer {
            background: var(--surface);
            margin-top: 28px;
            padding: 14px 16px;
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 12px;
            color: var(--muted);
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
        }

        footer a:hover { color: var(--text); }

        .log-ts     { color: var(--muted); }
        .log-logger { color: var(--muted); }
        .log-level  { font-weight: 700; }
        .log-level-debug    { color: var(--muted); }
        .log-level-info     { color: var(--accent); }
        .log-level-warning  { color: var(--yellow); }
        .log-level-error,
        .log-level-critical { color: var(--red); }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
</head>
<body>
    {% block content %}{% endblock %}
    <footer>
        <a href="https://github.com/pedrodanielsantos/Pedro-bot" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://github.com/pedrodanielsantos/Pedro-bot#readme" target="_blank" rel="noopener noreferrer">README</a>
        <span>discord.py {{ discord_version }}</span>
        {% if commit_hash %}<span>{{ commit_hash }}</span>{% endif %}
    </footer>
</body>
</html>
