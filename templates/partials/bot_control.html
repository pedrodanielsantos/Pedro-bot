<span id="bot-status-group" style="display: inline-flex; align-items: center; gap: 10px;"
    {% if status != "stopped" and not is_ready %}
    hx-get="/bot/status?announce=true" hx-trigger="load delay:1s, every 2s" hx-swap="outerHTML"
    {% endif %}>
    <div class="dot {{ 'dot-online' if is_ready else 'dot-offline' }}"></div>
    {% if status == "stopped" %}
    <button class="btn btn-success"
        hx-post="/bot/start"
        hx-target="#bot-status-group"
        hx-swap="outerHTML"
        hx-disabled-elt="this">
        <span class="btn-label">Start</span>
        <span class="btn-label htmx-indicator">Starting…</span>
    </button>
    {% else %}
    {% if status == "stopping" %}
    <span class="badge badge-error">Stopping…</span>
    {% elif not is_ready %}
    <span class="badge badge-ok">Starting…</span>
    {% elif just_restarted %}
    <span class="badge badge-ok"
        hx-get="/bot/status/clear"
        hx-trigger="load delay:2s"
        hx-target="this"
        hx-swap="outerHTML">
        Started
    </span>
    {% endif %}
    <button class="btn btn-danger"
        hx-post="/bot/stop"
        hx-target="#bot-status-group"
        hx-swap="outerHTML"
        hx-disabled-elt="this">
        <span class="btn-label">Stop</span>
        <span class="btn-label htmx-indicator">Stopping…</span>
    </button>
    {% endif %}
</span>
