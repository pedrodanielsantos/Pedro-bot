{% for guild in guilds %}
<div class="guild-item">
    <span class="guild-name">{{ guild.name }}</span>
    <span class="guild-meta">{{ guild.members }} members &middot; {{ guild.id }}</span>
</div>
{% endfor %}
<div style="padding: 10px 0 2px; text-align: right;">
    <button class="btn"
        hx-get="/guilds/clear"
        hx-target="#guild-list"
        hx-swap="innerHTML">
        Hide
    </button>
</div>
