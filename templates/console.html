{% extends "base.html" %}
{% block title %}Console{% endblock %}
{% block content %}

<header>
    <div class="header-left">
        <div id="header-status-dot" class="dot {{ 'dot-online' if is_ready else 'dot-offline' }}"></div>
        <span class="header-title">{{ bot_name }}</span>
        <span class="header-sub">/ Console</span>
    </div>
    <a href="/" class="btn">Dashboard</a>
</header>

<main>
    <pre id="console-log" class="card" data-log-pos="{{ log_pos }}" style="font-family: var(--mono); font-size: 12px; white-space: pre-wrap; max-height: 75vh; overflow-y: auto;"
        >{% include "partials/console_log.html" %}</pre>
</main>

<script>
    (function() {
        const consoleLog = document.getElementById("console-log");
        const stickThreshold = 24;
        let stickToBottom = true;

        consoleLog.addEventListener("scroll", () => {
            stickToBottom = consoleLog.scrollHeight - consoleLog.scrollTop - consoleLog.clientHeight < stickThreshold;
        });

        consoleLog.scrollTop = consoleLog.scrollHeight;

        // Starts at the byte offset the static render above already covers, so a
        // reconnect with nothing received live yet still resumes from there instead
        // of jumping to "now" and skipping whatever was logged in the gap (e.g. a
        // web.py reload's own log lines). After the first message, EventSource tracks
        // Last-Event-ID itself and resends it automatically on every reconnect, so
        // nothing further needs to be done here for that.
        const logPos = consoleLog.dataset.logPos;
        const logSource = new EventSource(logPos ? `/console/logs/stream?last_id=${logPos}` : "/console/logs/stream");
        // Appends instead of replacing, so an active text selection isn't lost.
        logSource.onmessage = (e) => {
            consoleLog.insertAdjacentHTML("beforeend", e.data + "\n");
            if (stickToBottom) {
                consoleLog.scrollTop = consoleLog.scrollHeight;
            }
        };

        // Mirrors the header dot across tabs.
        const statusDot = document.getElementById('header-status-dot');
        const statusSource = new EventSource('/status/stream');
        statusSource.addEventListener('ready', (e) => {
            const data = JSON.parse(e.data);
            statusDot.className = `dot ${data.ready ? 'dot-online' : 'dot-offline'}`;
        });
    })();
</script>

{% endblock %}
