{% extends "base.html" %}
{% block title %}Console{% endblock %}
{% block content %}

<header>
    <div class="header-left">
        <div class="dot {{ 'dot-online' if is_ready else 'dot-offline' }}"></div>
        <span class="header-title">{{ bot_name }}</span>
        <span class="header-sub">/ Console</span>
    </div>
    <a href="/" class="btn">Dashboard</a>
</header>

<main>
    <pre id="console-log" class="card" style="font-family: var(--mono); font-size: 12px; white-space: pre-wrap; max-height: 75vh; overflow-y: auto;"
        hx-get="/console/logs" hx-trigger="load, every 2s" hx-swap="innerHTML">{% include "partials/console_log.html" %}</pre>
</main>

<script>
    (function() {
        const consoleLog = document.getElementById("console-log");
        const stickThreshold = 24;
        let stickToBottom = true;

        consoleLog.addEventListener("scroll", () => {
            stickToBottom = consoleLog.scrollHeight - consoleLog.scrollTop - consoleLog.clientHeight < stickThreshold;
        });

        document.body.addEventListener("htmx:afterSwap", (e) => {
            if (e.target.id === "console-log" && stickToBottom) {
                consoleLog.scrollTop = consoleLog.scrollHeight;
            }
        });
    })();
</script>

{% endblock %}
